<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - MiniPlay</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../navbar.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="../../index.html" class="nav-logo">MiniPlay</a>
        <ul class="nav-links">
            <li><a href="../../index.html">Home</a></li>
            <li><a href="../../index.html#games">Games</a></li>
            <li><a href="../../about.html">About</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <h1 class="logo">Memory Game</h1>
            <div class="stats">
                <p>Moves: <span id="moves">0</span></p>
                <p>Matches: <span id="matches">0</span> / 8</p>
            </div>
            <div class="controls">
                <button id="restart-btn" class="neon-btn">Restart</button>
                <a href="../../index.html" class="neon-btn back-btn">Back to Home</a>
            </div>
        </header>

        <div class="game-board" id="game-board">
            <!-- Cards generated by JS -->
        </div>

        <div id="win-screen" class="modal hidden">
            <div class="modal-content">
                <h2>You Win!</h2>
                <p>Total Moves: <span id="final-moves"></span></p>
                <button id="play-again-btn" class="neon-btn">Play Again</button>
                <a href="../../index.html" class="neon-btn back-btn">Back to Home</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
